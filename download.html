<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RedeWarriors – Download</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #050608;
      --surface:  #0d0f14;
      --border:   #1c2030;
      --gold:     #f5c842;
      --gold2:    #e8a800;
      --orange:   #ff6a1a;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --radius:   14px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
    }
    body.single-mode { overflow: hidden; height: 100vh; }

    /* ── background ── */
    .bg-wrap {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ── noise overlay ── */
    .noise {
      position: fixed; inset: 0; z-index: 2;
      pointer-events: none;
      opacity: .035;
      background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }

    /* ── layout (single mode) ── */
    .page {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 0;
      animation: fadeIn .6s ease both;
    }

    /* ── layout (hub mode) ── */
    .hub {
      position: relative; z-index: 1;
      min-height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      padding: clamp(50px, 9vh, 90px) clamp(20px, 4vw, 40px) 80px;
      animation: fadeIn .7s ease both;
    }

    .hub-header {
      margin-bottom: clamp(36px, 6vh, 56px);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .hub-header::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -1px;
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .hub-header-left {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hub-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: .8rem;
      letter-spacing: .3em;
      color: var(--gold);
      text-transform: uppercase;
      width: fit-content;
    }

    .hub-kicker::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 10px var(--gold);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    .hub h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1;
      letter-spacing: .02em;
      color: var(--text);
      margin: 0;
    }

    .hub h1 span {
      color: var(--gold);
    }

    .hub-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: .85rem;
      letter-spacing: .2em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
      padding-bottom: 4px;
    }

    .hub-count b {
      color: var(--text);
      font-weight: normal;
      font-size: 1rem;
    }

    /* ── cards list (vertical) ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: clamp(12px, 2vw, 16px);
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: clamp(16px, 3vw, 24px);
      background: linear-gradient(90deg, rgba(20,24,34,.9) 0%, rgba(13,15,20,.95) 100%);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(18px, 3vw, 24px) clamp(20px, 3vw, 28px);
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: transform .25s cubic-bezier(.2,.9,.3,1.2), border-color .25s, box-shadow .25s, background .25s;
      opacity: 0;
      animation: cardIn .6s cubic-bezier(.2,.9,.3,1.2) forwards;
    }

    .card:nth-child(1) { animation-delay: .08s; }
    .card:nth-child(2) { animation-delay: .16s; }
    .card:nth-child(3) { animation-delay: .24s; }
    .card:nth-child(4) { animation-delay: .32s; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateX(-24px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(245,200,66,.1) 0%, transparent 40%);
      opacity: 0;
      transition: opacity .3s ease;
      pointer-events: none;
    }

    .card:hover {
      transform: translateX(6px);
      border-color: rgba(245,200,66,.25);
      border-left-color: var(--gold);
      background: linear-gradient(90deg, rgba(30,26,16,.9) 0%, rgba(13,15,20,.95) 100%);
      box-shadow: 0 12px 30px rgba(0,0,0,.5), -8px 0 20px rgba(245,200,66,.12);
    }

    .card:hover::before { opacity: 1; }

    .card-left {
      display: flex;
      align-items: center;
      gap: clamp(14px, 2.5vw, 20px);
    }

    .card-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      line-height: 1;
      color: rgba(245,200,66,.2);
      letter-spacing: 0;
      min-width: 44px;
      transition: color .25s;
    }

    .card:hover .card-num { color: var(--gold); }

    .card-icon {
      width: clamp(44px, 8vw, 52px);
      height: clamp(44px, 8vw, 52px);
      border-radius: 10px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--orange) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(245,200,66,.25);
      flex-shrink: 0;
    }

    .card-icon svg { width: 55%; height: 55%; fill: #050608; }

    .card-text {
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .card-platform {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(.7rem, 1.8vw, .78rem);
      letter-spacing: .25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem, 3vw, 1.5rem);
      letter-spacing: .03em;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: clamp(.82rem, 1.8vw, .88rem);
      color: var(--muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(245,200,66,.08);
      border: 1px solid rgba(245,200,66,.15);
      transition: background .25s, border-color .25s, transform .25s;
      flex-shrink: 0;
    }

    .card:hover .card-cta {
      background: var(--gold);
      border-color: var(--gold);
      transform: rotate(-45deg);
    }

    .card-cta svg {
      width: 18px; height: 18px;
      fill: var(--gold);
      transition: fill .25s;
    }

    .card:hover .card-cta svg { fill: #050608; }

    /* hide card-cta text label since we use arrow-only */
    .card-cta-text { display: none; }

    @media (max-width: 480px) {
      .card-num { display: none; }
      .card-left { gap: 14px; }
    }

    /* ── single mode animations ── */

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── logo badge ── */
    .badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(.75rem, 2vw, .95rem);
      letter-spacing: .25em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 18px;
      opacity: .7;
    }

    /* ── icon ── */
    .icon-wrap {
      width: clamp(72px, 14vw, 110px);
      height: clamp(72px, 14vw, 110px);
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold) 0%, var(--orange) 100%);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: clamp(20px, 4vh, 34px);
      box-shadow: 0 0 40px rgba(245,200,66,.35), 0 0 80px rgba(245,200,66,.12);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(245,200,66,.35), 0 0 80px rgba(245,200,66,.12); }
      50%       { box-shadow: 0 0 60px rgba(245,200,66,.55), 0 0 120px rgba(245,200,66,.22); }
    }

    .icon-wrap svg {
      width: 48%;
      height: 48%;
      fill: #050608;
    }

    /* ── title ── */
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 8vw, 5rem);
      line-height: 1;
      text-align: center;
      letter-spacing: .03em;
      background: linear-gradient(160deg, #fff 30%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    /* ── subtitle ── */
    .subtitle {
      font-size: clamp(.9rem, 2.5vw, 1.15rem);
      color: var(--muted);
      text-align: center;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: clamp(28px, 5vh, 48px);
    }

    /* ── download button ── */
    .btn-download {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: clamp(16px, 3vw, 22px) clamp(32px, 6vw, 60px);
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 60%, var(--orange) 100%);
      color: #050608;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.3rem, 4vw, 2rem);
      letter-spacing: .1em;
      text-decoration: none;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
      box-shadow: 0 4px 30px rgba(245,200,66,.4), 0 2px 8px rgba(0,0,0,.6);
    }

    .btn-download:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 50px rgba(245,200,66,.6), 0 4px 16px rgba(0,0,0,.7);
      filter: brightness(1.07);
    }

    .btn-download:active {
      transform: translateY(0) scale(.98);
    }

    .btn-download svg {
      width: clamp(20px, 4vw, 28px);
      height: clamp(20px, 4vw, 28px);
      fill: #050608;
      flex-shrink: 0;
    }

    /* ── info pill ── */
    .info-pill {
      margin-top: clamp(16px, 3vh, 26px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 8px 20px;
      font-size: clamp(.75rem, 2vw, .85rem);
      color: var(--muted);
      letter-spacing: .06em;
      text-align: center;
    }

    .info-pill span {
      color: var(--gold);
      font-weight: 700;
    }

    /* ── 404 state ── */
    .not-found h1 {
      background: linear-gradient(160deg, #fff 30%, #f87171 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }
    .not-found .icon-wrap {
      background: linear-gradient(135deg, #f87171 0%, #7f1d1d 100%);
      box-shadow: 0 0 40px rgba(248,113,113,.3);
    }
    .not-found .icon-wrap svg { fill: #fff; }

    /* ── footer ── */
    footer {
      text-align: center;
      padding: 40px 20px 24px;
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .2em;
      opacity: .4;
      position: relative;
      z-index: 1;
    }
    body.single-mode footer {
      position: fixed; bottom: 18px; left: 0; right: 0;
      padding: 0;
    }
  </style>
</head>
<body>

<div class="bg-wrap"></div>
<div class="noise"></div>

<div id="app"></div>

<footer>REDEWARRIORS &nbsp;·&nbsp; KAI SERVER &nbsp;·&nbsp; <span style="color:var(--gold)">EST. 2024</span></footer>

<script>
  // ── config ────────────────────────────────────────────────────────────
  const CONFIGS = {
    mods: {
      title:    'MODS & INSTALAÇÃO MANUAL',
      subtitle: 'TLauncher · PC',
      info:     'Arquivo <span>.ZIP</span> · Windows / Linux / macOS',
      href:     'https://cdn.enixstudios.com/kakarot/mods.zip',
      label:    'BAIXAR MODS',
      icon:     'archive',
      platform: 'TLAUNCHER · PC',
      desc:     'Pacote de mods para instalação manual no TLauncher ou outros launchers compatíveis com Forge 1.7.10.',
    },
    launcher: {
      title:    'LAUNCHER REDEWARRIORS',
      subtitle: 'Instalador Oficial · PC',
      info:     'Arquivo <span>.EXE</span> · Windows',
      href:     'https://cdn.enixstudios.com/kakarot/RedeWarriorsKakarot.exe',
      label:    'BAIXAR LAUNCHER',
      icon:     'download',
      platform: 'WINDOWS · OFICIAL',
      desc:     'Launcher oficial com instalação automática de mods, Forge e auto-update. Recomendado para iniciantes.',
    },
    mobile: {
      title:    'LAUNCHER MOBILE',
      subtitle: 'RedeWarriors · Android',
      info:     'Redireciona para <span>redewarriors.online</span>',
      href:     'https://www.redewarriors.online/mobile',
      label:    'BAIXAR APP',
      icon:     'mobile',
      platform: 'ANDROID · MOBILE',
      desc:     'Acesse a Rede Warriors pelo celular. Você será redirecionada para a página de instalação mobile.',
    },
    textura: {
      title:    'PACOTE DE TEXTURAS',
      subtitle: 'DBCWarriors · Resourcepack',
      info:     'Arquivo <span>.ZIP</span> · Resourcepack Minecraft',
      href:     'https://cdn.enixstudios.com/kakarot/resourcepacks/dbcwarriors.zip',
      label:    'BAIXAR TEXTURAS',
      icon:     'texture',
      platform: 'RESOURCEPACK',
      desc:     'Pacote de texturas DBCWarriors. Melhora visualmente armas, UI e elementos do servidor Kakarot.',
    },
  };

  // ── icons ─────────────────────────────────────────────────────────────
  const ICONS = {
    download: `<svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/></svg>`,
    archive:  `<svg viewBox="0 0 24 24"><path d="M20 6H4l-2 4v2h2v8h16v-8h2v-2l-2-4zm-8 11l-4-4h3V9h2v4h3l-4 4zm6-7H6V7h12v3z"/></svg>`,
    mobile:   `<svg viewBox="0 0 24 24"><path d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 2v16h10V4H7zm5 13a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>`,
    texture:  `<svg viewBox="0 0 24 24"><path d="M4 4h4v4H4V4zm6 0h4v4h-4V4zm6 0h4v4h-4V4zM4 10h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4zM4 16h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4z"/></svg>`,
    warn:     `<svg viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 3.5L20.5 19h-17L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/></svg>`,
    arrow:    `<svg viewBox="0 0 24 24"><path d="M13.3 5.3L11.9 6.7 16.2 11H3v2h13.2l-4.3 4.3 1.4 1.4L20 12z"/></svg>`,
  };

  // ── render ─────────────────────────────────────────────────────────────
  function renderSingle(key) {
    document.body.classList.add('single-mode');
    const cfg = CONFIGS[key];
    document.getElementById('app').innerHTML = `
      <div class="page">
        <div class="badge">RedeWarriors · Kai</div>
        <div class="icon-wrap">${ICONS[cfg.icon]}</div>
        <h1>${cfg.title}</h1>
        <p class="subtitle">${cfg.subtitle}</p>
        <a class="btn-download" href="${cfg.href}" ${key === 'mobile' ? '' : 'download'}>
          ${ICONS.download}
          ${cfg.label}
        </a>
        <div class="info-pill">${cfg.info}</div>
      </div>
    `;
  }

  function renderHub() {
    document.body.classList.remove('single-mode');
    const keys  = Object.keys(CONFIGS);
    const order = ['launcher', 'mobile', 'mods', 'textura'];
    const sorted = order.filter(k => keys.includes(k));

    const cards = sorted.map((key, i) => {
      const cfg = CONFIGS[key];
      const num = String(i + 1).padStart(2, '0');
      return `
        <a class="card" href="?d=${key}" data-key="${key}">
          <div class="card-left">
            <span class="card-num">${num}</span>
            <div class="card-icon">${ICONS[cfg.icon]}</div>
          </div>
          <div class="card-text">
            <div class="card-platform">${cfg.platform}</div>
            <div class="card-title">${cfg.title}</div>
            <div class="card-desc">${cfg.desc}</div>
          </div>
          <div class="card-cta">${ICONS.arrow}</div>
        </a>
      `;
    }).join('');

    document.getElementById('app').innerHTML = `
      <div class="hub">
        <header class="hub-header">
          <div class="hub-header-left">
            <div class="hub-kicker">Kai · RedeWarriors</div>
            <h1>Downloads<span>.</span></h1>
          </div>
          <div class="hub-count"><b>${sorted.length}</b> &nbsp;ARQUIVOS DISPONÍVEIS</div>
        </header>
        <div class="cards">${cards}</div>
      </div>
    `;

    // spotlight hover effect
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        card.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
        card.style.setProperty('--my', ((e.clientY - r.top)  / r.height * 100) + '%');
      });
    });
  }

  function renderNotFound() {
    document.body.classList.add('single-mode');
    document.getElementById('app').innerHTML = `
      <div class="page not-found">
        <div class="badge">RedeWarriors · Kai</div>
        <div class="icon-wrap">${ICONS.warn}</div>
        <h1>LINK INVÁLIDO</h1>
        <p class="subtitle">Parâmetro de download não encontrado</p>
        <a href="./" class="btn-download">
          ${ICONS.arrow}
          VOLTAR À CENTRAL
        </a>
      </div>
    `;
  }

  function render() {
    const params = new URLSearchParams(window.location.search);
    const d = (params.get('d') || window.location.hash.replace('#','') || '').toLowerCase().trim();

    if (!d) return renderHub();
    if (CONFIGS[d]) return renderSingle(d);
    return renderNotFound();
  }

  render();
</script>
</body>
</html>
